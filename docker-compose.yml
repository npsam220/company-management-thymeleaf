services:

  backend:
    build: ./backend

    container_name: company-management-backend

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "8081:8080"

    volumes:
      - ./uploads:/app/uploads

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/company_management
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: springboot

  mysql:
    image: mysql:8.0

    container_name: company-management-mysql

    restart: unless-stopped

    ports:
      - "3308:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    environment:
      MYSQL_ROOT_PASSWORD: springboot
      MYSQL_DATABASE: company_management

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pspringboot" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
