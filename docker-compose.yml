services:

  backend:

    build: ./backend

    container_name: company-thymeleaf-backend

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    ports:
      - "8082:8080"

    volumes:
      - ./uploads:/app/uploads

    environment:
      SPRING_PROFILES_ACTIVE: prod

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/company_management
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: springboot

  mysql:
    image: mysql:8.0

    container_name: company-thymeleaf-mysql

    restart: unless-stopped

    ports:
      - "3309:3306"

    volumes:
      - company_management_thymeleaf_mysql_data:/var/lib/mysql

    environment:
      MYSQL_ROOT_PASSWORD: springboot
      MYSQL_DATABASE: company_management

    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pspringboot" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  company_management_thymeleaf_mysql_data:
