app.file.photo-dir=uploads/staff_photo
app.file.resume-dir=uploads/staff_file
spring.application.name=backend
spring.thymeleaf.cache=false

spring.datasource.url=jdbc:mysql://localhost:3306/company_management
#spring.datasource.url=jdbc:mysql://host.docker.internal:3307/company_management
spring.datasource.username=root
spring.datasource.password=springboot
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.company.backend.entity

server.port=8080

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
