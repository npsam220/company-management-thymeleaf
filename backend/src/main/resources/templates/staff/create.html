<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">スタッフ新規登録</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="cust-spec-page staff-detail-page">
    <header class="app-header">
        <div class="app-header__inner">
            <a class="brand" th:href="@{/staff/list}">Company Management</a>
            <span th:text="${pageTitle}">スタッフ新規登録</span>
        </div>
    </header>
    <main class="container">
        <div class="alert alert--error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
        <form class="cust-spec-shell staff-detail-shell" method="post" enctype="multipart/form-data"
            th:action="@{/staff/create}" th:object="${staff}">
            <div class="cust-spec-title">
                <h1>スタッフ情報</h1>
            </div>
            <div class="staff-detail-actions">
                <button class="button button--spec" type="submit">登録</button>
                <a class="button button--spec" th:href="@{/staff/list}">キャンセル</a>
            </div>
            <div th:replace="~{staff/form :: fields}"></div>
        </form>
    </main>
    <script th:src="@{/js/staff-form.js}"></script>
</body>

</html>
