<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>スタッフ情報一覧</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="cust-spec-page staff-spec-page">
    <header class="app-header">
        <div class="app-header__inner">
            <a class="brand" th:href="@{/staff/list}">Company Management</a>
            <span>スタッフ情報一覧</span>
        </div>
    </header>

    <main class="container">
        <div class="alert alert--success" th:if="${message}" th:text="${message}"></div>

        <section class="cust-spec-shell">
            <div class="cust-spec-title">
                <h1>スタッフ情報一覧</h1>
            </div>

            <form method="get" th:action="@{/staff/list}" th:object="${search}">
                <div class="staff-spec-search">
                    <div class="staff-spec-search__row">
                        <label class="staff-spec-label" for="staffNm">氏名</label>
                        <input id="staffNm" type="text" th:field="*{staffNm}">
                    </div>
                    <div class="staff-spec-search__row">
                        <label class="staff-spec-label" for="staffCls">スタッフ区分</label>
                        <select id="staffCls" th:field="*{staffCls}">
                            <option value=""></option>
                            <option th:each="item : ${staffClsList}" th:value="${item.comCd}"
                                th:text="${item.comContent1}"></option>
                        </select>
                    </div>
                    <div class="staff-spec-search__row">
                        <label class="staff-spec-label" for="staffSalesstatus">営業ステータス</label>
                        <select id="staffSalesstatus" th:field="*{staffSalesstatus}">
                            <option value=""></option>
                            <option th:each="item : ${salesStatusList}" th:value="${item.comCd}"
                                th:text="${item.comContent1}"></option>
                        </select>
                    </div>
                </div>

                <div class="cust-spec-actions staff-spec-actions">
                    <button class="button button--spec" type="submit">検索</button>
                    <a class="button button--spec" th:href="@{/staff/create}">新規入力</a>
                    <a class="button button--spec" th:href="@{/staff/list}">リセット</a>
                </div>
            </form>

            <div class="table-scroll">
                <table class="cust-spec-table staff-spec-table">
                    <thead>
                        <tr>
                            <th class="cust-spec-page-size">
                                <form method="get" th:action="@{/staff/list}">
                                    <label for="pageSize">表示件数</label>
                                    <select id="pageSize" name="pageSize" onchange="this.form.submit()">
                                        <option th:each="size : ${T(java.util.List).of(10, 30, 50)}" th:value="${size}"
                                            th:text="${size}" th:selected="${size == pageSize}"></option>
                                    </select>
                                    <input type="hidden" name="staffNm" th:value="${search.staffNm}">
                                    <input type="hidden" name="staffCls" th:value="${search.staffCls}">
                                    <input type="hidden" name="staffSalesstatus" th:value="${search.staffSalesstatus}">
                                </form>
                            </th>
                            <th>No.</th>
                            <th>氏名</th>
                            <th>スタッフ区分</th>
                            <th>営業ステータス</th>
                            <th>備考</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(staffList)}">
                            <td class="empty-state" colspan="6">該当するスタッフはありません。</td>
                        </tr>
                        <tr th:each="staff, stat : ${staffList}">
                            <td class="cust-spec-action-cell">
                                <a class="button button--spec"
                                    th:href="@{/staff/detail/{id}(id=${staff.staffId})}">編集</a>
                                <form method="post" th:action="@{/staff/delete/{id}(id=${staff.staffId})}"
                                    onsubmit="return confirm('このスタッフを削除しますか？');">
                                    <button class="button button--spec" type="submit">削除</button>
                                </form>
                            </td>
                            <td th:text="${(currentPage - 1) * pageSize + stat.index + 1}"></td>
                            <td th:text="${staff.staffNm}"></td>
                            <td th:text="${staff.staffClsName}"></td>
                            <td th:text="${staff.staffSalesstatusName}"></td>
                            <td th:text="${staff.staffRmk1}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination-wrap" th:if="${totalPages > 1}">
                <nav class="pagination">
                    <a th:classappend="${currentPage == 1} ? ' disabled'"
                        th:href="@{/staff/list(page=${currentPage - 1},pageSize=${pageSize},staffNm=${search.staffNm},staffCls=${search.staffCls},staffSalesstatus=${search.staffSalesstatus})}">&lt;&lt;</a>
                    <a th:each="number : ${pageNumbers}" th:if="${totalPages <= 10 or number <= 5}"
                        th:classappend="${number == currentPage} ? ' active'"
                        th:href="@{/staff/list(page=${number},pageSize=${pageSize},staffNm=${search.staffNm},staffCls=${search.staffCls},staffSalesstatus=${search.staffSalesstatus})}"
                        th:text="${number}"></a>
                    <span class="pagination-ellipsis" th:if="${totalPages > 10}">...</span>
                    <a th:each="number : ${pageNumbers}" th:if="${totalPages > 10 and number > totalPages - 5}"
                        th:classappend="${number == currentPage} ? ' active'"
                        th:href="@{/staff/list(page=${number},pageSize=${pageSize},staffNm=${search.staffNm},staffCls=${search.staffCls},staffSalesstatus=${search.staffSalesstatus})}"
                        th:text="${number}"></a>
                    <a th:classappend="${currentPage == totalPages} ? ' disabled'"
                        th:href="@{/staff/list(page=${currentPage + 1},pageSize=${pageSize},staffNm=${search.staffNm},staffCls=${search.staffCls},staffSalesstatus=${search.staffSalesstatus})}">&gt;&gt;</a>
                </nav>

                <form class="pagination-jump" method="get" th:action="@{/staff/list}">
                    <label for="staffPageJump">ページ</label>
                    <select id="staffPageJump" name="page" onchange="this.form.submit()">
                        <option th:each="number : ${#numbers.sequence(1, totalPages)}" th:value="${number}"
                            th:text="${number}" th:selected="${number == currentPage}"></option>
                    </select>
                    <input type="hidden" name="pageSize" th:value="${pageSize}">
                    <input type="hidden" name="staffNm" th:value="${search.staffNm}">
                    <input type="hidden" name="staffCls" th:value="${search.staffCls}">
                    <input type="hidden" name="staffSalesstatus" th:value="${search.staffSalesstatus}">
                </form>
            </div>
        </section>
    </main>
</body>

</html>
