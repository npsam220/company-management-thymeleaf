<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>スタッフ情報一覧</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header class="app-header">
    <div class="app-header__inner">
        <a class="brand" th:href="@{/staff/list}">Company Management</a>
        <span>スタッフ管理</span>
    </div>
</header>

<main class="container">
    <div class="page-heading">
        <div>
            <p class="eyebrow">STAFF MANAGEMENT</p>
            <h1>スタッフ情報一覧</h1>
        </div>
        <a class="button button--primary" th:href="@{/staff/create}">新規登録</a>
    </div>

    <div class="alert alert--success" th:if="${message}" th:text="${message}"></div>

    <section class="panel">
        <form method="get" th:action="@{/staff/list}" th:object="${search}">
            <div class="search-grid">
                <label>
                    <span>氏名</span>
                    <input type="text" th:field="*{staffNm}" placeholder="氏名を入力">
                </label>
                <label>
                    <span>スタッフ区分</span>
                    <select th:field="*{staffCls}">
                        <option value="">すべて</option>
                        <option th:each="item : ${staffClsList}"
                                th:value="${item.comCd}"
                                th:text="${item.comContent1}"></option>
                    </select>
                </label>
                <label>
                    <span>営業ステータス</span>
                    <select th:field="*{staffSalesstatus}">
                        <option value="">すべて</option>
                        <option th:each="item : ${salesStatusList}"
                                th:value="${item.comCd}"
                                th:text="${item.comContent1}"></option>
                    </select>
                </label>
                <label>
                    <span>表示件数</span>
                    <select name="pageSize">
                        <option th:each="size : ${T(java.util.List).of(5, 10, 20)}"
                                th:value="${size}"
                                th:text="${size + '件'}"
                                th:selected="${size == pageSize}"></option>
                    </select>
                </label>
            </div>
            <div class="button-row">
                <button class="button button--primary" type="submit">検索</button>
                <a class="button button--secondary" th:href="@{/staff/list}">クリア</a>
            </div>
        </form>
    </section>

    <section class="panel table-panel">
        <div class="result-summary">
            <strong th:text="${totalCount}">0</strong> 件
        </div>
        <div class="table-scroll">
            <table>
                <thead>
                <tr>
                    <th>No.</th>
                    <th>氏名</th>
                    <th>スタッフ区分</th>
                    <th>営業ステータス</th>
                    <th>備考</th>
                    <th class="actions">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(staffList)}">
                    <td colspan="6" class="empty-state">該当するスタッフはありません。</td>
                </tr>
                <tr th:each="staff, stat : ${staffList}">
                    <td th:text="${(currentPage - 1) * pageSize + stat.count}"></td>
                    <td>
                        <a class="name-link"
                           th:href="@{/staff/detail/{id}(id=${staff.staffId})}"
                           th:text="${staff.staffNm}"></a>
                        <small th:text="${staff.staffNo}"></small>
                    </td>
                    <td th:text="${staff.staffClsName}"></td>
                    <td><span class="status" th:text="${staff.staffSalesstatusName}"></span></td>
                    <td th:text="${staff.staffRmk1}"></td>
                    <td class="actions">
                        <a class="button button--small button--secondary"
                           th:href="@{/staff/detail/{id}(id=${staff.staffId})}">編集</a>
                        <form class="inline-form" method="post"
                              th:action="@{/staff/delete/{id}(id=${staff.staffId})}"
                              onsubmit="return confirm('このスタッフを削除しますか？');">
                            <button class="button button--small button--danger" type="submit">削除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav class="pagination" th:if="${totalPages > 1}">
            <a th:classappend="${currentPage == 1} ? ' disabled'"
               th:href="@{/staff/list(page=${currentPage - 1},pageSize=${pageSize},staffNm=${search.staffNm},staffCls=${search.staffCls},staffSalesstatus=${search.staffSalesstatus})}">
                前へ
            </a>
            <a th:each="number : ${pageNumbers}"
               th:if="${totalPages <= 10 or number == 1 or number == totalPages or (number >= currentPage - 2 and number <= currentPage + 2)}"
               th:classappend="${number == currentPage} ? ' active'"
               th:href="@{/staff/list(page=${number},pageSize=${pageSize},staffNm=${search.staffNm},staffCls=${search.staffCls},staffSalesstatus=${search.staffSalesstatus})}"
               th:text="${number}"></a>
            <a th:classappend="${currentPage == totalPages} ? ' disabled'"
               th:href="@{/staff/list(page=${currentPage + 1},pageSize=${pageSize},staffNm=${search.staffNm},staffCls=${search.staffCls},staffSalesstatus=${search.staffSalesstatus})}">
                次へ
            </a>
        </nav>
    </section>
</main>
</body>
</html>
