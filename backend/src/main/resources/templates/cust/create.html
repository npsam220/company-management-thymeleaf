<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>取引先情報</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="cust-spec-page cust-detail-page">
    <header class="app-header">
        <div class="app-header__inner">
            <a class="brand" th:href="@{/cust/list}">Company Management</a>
            <span>取引先情報</span>
        </div>
    </header>

    <main class="container">
        <div class="alert alert--success" th:if="${message}" th:text="${message}"></div>

        <form class="cust-spec-shell cust-detail-shell" method="post" th:action="@{/cust/create}" th:object="${cust}">
            <input type="hidden" th:field="*{custId}">
            <div class="alert alert--error" th:if="${#fields.hasAnyErrors()}">
                <ul>
                    <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                </ul>
            </div>

            <div class="cust-spec-title">
                <h1>取引先情報</h1>
            </div>

            <div class="cust-detail-actions">
                <button class="button button--spec" type="submit">登録</button>
                <a class="button button--spec" th:href="@{/cust/list}">キャンセル</a>
            </div>
            <div th:replace="~{cust/form :: fields}"></div>

        </form>
    </main>
    <script th:src="@{/js/cust-detail.js}"></script>
    <script>
        document.querySelectorAll(".cust-detail-closing-day").forEach((select) => {
            const dayInput = document.getElementById(select.dataset.dayInput);
            const dayGroup = document.getElementById(`${select.dataset.dayInput}Group`);

            const updateDayInput = () => {
                const isSpecified = select.value === "05";
                dayInput.disabled = !isSpecified;
                dayInput.required = isSpecified;
                dayGroup.hidden = !isSpecified;
                if (!isSpecified) {
                    dayInput.value = "";
                }
            };

            select.addEventListener("change", updateDayInput);
            updateDayInput();
        });

        async function searchPostalAddress() {
            const postalCode = document.getElementById("custPostno");
            const address = document.getElementById("custAddress");
            const normalized = postalCode?.value.replace(/\D/g, "");
            if (!normalized || normalized.length !== 7) {
                window.alert("郵便番号は7桁で入力してください。");
                return;
            }
            const response = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${normalized}`);
            const data = await response.json();
            if (!data.results?.length) {
                window.alert("住所が見つかりませんでした。");
                return;
            }
            const result = data.results[0];
            address.value = `${result.address1}${result.address2}${result.address3}`;
        }
    </script>
</body>

</html>
