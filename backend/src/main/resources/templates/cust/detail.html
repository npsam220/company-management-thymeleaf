<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>取引先情報詳細</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="cust-spec-page cust-detail-page">
    <header class="app-header">
        <div class="app-header__inner">
            <a class="brand" th:href="@{/cust/list}">Company Management</a>
            <span>取引先情報詳細</span>
        </div>
    </header>

    <main class="container">
        <div class="alert alert--success" th:if="${message}" th:text="${message}"></div>

        <form class="cust-spec-shell cust-detail-shell" method="post" th:action="@{/cust/update}" th:object="${cust}">
            <input type="hidden" th:field="*{custId}">
            <div class="alert alert--error" th:if="${#fields.hasAnyErrors()}">
                <ul>
                    <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                </ul>
            </div>

            <div class="cust-spec-title">
                <h1>取引先情報詳細</h1>
            </div>

            <div class="cust-detail-actions">
                <button class="button button--spec" type="submit">更新へ</button>
                <a class="button button--spec" th:href="@{/cust/list}">キャンセル</a>
            </div>

            <section class="cust-detail-section">
                <h2 class="cust-detail-section__title">
                    <span>基本情報</span>
                    <span class="cust-detail-section__arrow" aria-hidden="true">▲</span>
                </h2>

                <div class="cust-detail-basic">
                    <dl class="cust-detail-list">
                        <div class="cust-detail-item">
                            <dt><label for="custNm">取引先名</label></dt>
                            <dd>
                                <input id="custNm" type="text" th:field="*{custNm}" required>
                                <span class="field-error" th:if="${#fields.hasErrors('custNm')}"
                                    th:errors="*{custNm}"></span>
                            </dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custKn">カナ</label></dt>
                            <dd><input id="custKn" type="text" th:field="*{custKn}"></dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custWeb">Webサイト</label></dt>
                            <dd><input id="custWeb" type="url" th:field="*{custWeb}"></dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custPostno">郵便番号</label></dt>
                            <dd><input id="custPostno" type="text" th:field="*{custPostno}"
                                    onchange="searchPostalAddress()"></dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custAddress">住所</label></dt>
                            <dd><input id="custAddress" type="text" th:field="*{custAddress}"></dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custPhone">電話番号</label></dt>
                            <dd><input id="custPhone" type="tel" th:field="*{custPhone}"></dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custFax">FAX</label></dt>
                            <dd><input id="custFax" type="tel" th:field="*{custFax}"></dd>
                        </div>
                        <div class="cust-detail-item cust-detail-item--remarks">
                            <dt><label for="custRmk1">備考</label></dt>
                            <dd><textarea id="custRmk1" rows="2" th:field="*{custRmk1}"></textarea></dd>
                        </div>
                    </dl>

                    <dl class="cust-detail-list">
                        <div class="cust-detail-item">
                            <dt><label for="custMoney">資本金</label></dt>
                            <dd class="cust-detail-input-with-unit">
                                <input id="custMoney" type="number" min="0" th:field="*{custMoney}">
                                <span>円</span>
                            </dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custType">取引先の種別</label></dt>
                            <dd>
                                <select id="custType" th:field="*{custType}">
                                    <option value="">選択してください</option>
                                    <option value="01">顧客</option>
                                    <option value="02">パートナー</option>
                                    <option value="03">顧客＆パートナー</option>
                                </select>
                            </dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custStartdt">取引先開始日</label></dt>
                            <dd>
                                <input id="custStartdt" type="date" name="custStartdt"
                                    th:value="${cust.custStartdt == null ? '' : #temporals.format(cust.custStartdt, 'yyyy-MM-dd')}">
                            </dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custInvoiceNo">登録番号</label></dt>
                            <dd><input id="custInvoiceNo" type="text" th:field="*{custInvoiceNo}"></dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt>Pマーク</dt>
                            <dd>
                                <div class="segmented-control">
                                    <label>
                                        <input type="radio" th:field="*{custInforSecurity}" value="01">
                                        <span>あり</span>
                                    </label>
                                    <label>
                                        <input type="radio" th:field="*{custInforSecurity}" value="02">
                                        <span>なし</span>
                                    </label>
                                </div>
                            </dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt>派遣資格</dt>
                            <dd>
                                <div class="segmented-control">
                                    <label>
                                        <input type="radio" th:field="*{custDispatch}" value="01">
                                        <span>あり</span>
                                    </label>
                                    <label>
                                        <input type="radio" th:field="*{custDispatch}" value="02">
                                        <span>なし</span>
                                    </label>
                                </div>
                            </dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custCompanyrep">自社担当者</label></dt>
                            <dd><input id="custCompanyrep" type="text" th:field="*{custCompanyrep}"></dd>
                        </div>
                    </dl>
                </div>
            </section>

            <section class="cust-detail-section">
                <h2 class="cust-detail-section__title">
                    <span>担当者</span>
                    <span class="cust-detail-section__arrow" aria-hidden="true">▲</span>
                </h2>

                <div class="cust-detail-manager-wrap">
                    <button id="addManagerRow" class="button button--spec cust-detail-manager-add" type="button">
                        行追加
                    </button>
                    <table class="cust-detail-manager-table">
                        <thead>
                            <tr>
                                <th>担当者名<span class="cust-detail-required">*</span></th>
                                <th>電話番号</th>
                                <th>メール</th>
                                <th>役職</th>
                                <th>備考</th>
                                <th aria-label="削除"></th>
                            </tr>
                        </thead>
                        <tbody id="managerRows">
                            <tr class="cust-detail-manager-row" th:each="manager, status : *{managers}">
                                <td>
                                    <input type="hidden" th:field="*{managers[__${status.index}__].managerCd}">
                                    <input type="hidden" th:field="*{managers[__${status.index}__].managerChrcd}">
                                    <input type="text" th:field="*{managers[__${status.index}__].managerNm}" required>
                                </td>
                                <td><input type="tel" th:field="*{managers[__${status.index}__].managerPno}"></td>
                                <td><input type="email" th:field="*{managers[__${status.index}__].managerMail}"></td>
                                <td>
                                    <select th:field="*{managers[__${status.index}__].managerJob}">
                                        <option value="">選択</option>
                                        <option value="01">営業</option>
                                        <option value="02">総務</option>
                                        <option value="03">その他</option>
                                    </select>
                                </td>
                                <td><input type="text" th:field="*{managers[__${status.index}__].managerRmk}"></td>
                                <td>
                                    <button class="button button--spec cust-detail-manager-remove" type="button"
                                        aria-label="担当者を削除">×</button>
                                </td>
                            </tr>
                            <tr id="managerEmptyRow" th:if="${#lists.isEmpty(cust.managers)}">
                                <td colspan="6" class="cust-detail-empty">担当者情報はありません。</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="cust-detail-section">
                <h2 class="cust-detail-section__title">
                    <span>支払サイト</span>
                    <span class="cust-detail-section__arrow" aria-hidden="true">▲</span>
                </h2>

                <div class="cust-detail-payment">
                    <dl class="cust-detail-list">
                        <div class="cust-detail-item">
                            <dt>入金日</dt>
                            <dd class="cust-detail-date-rule">
                                <select aria-label="入金月" th:field="*{custGetdt}">
                                    <option value="">選択</option>
                                    <option value="01">当月</option>
                                    <option value="02">翌月</option>
                                    <option value="03">翌々月</option>
                                </select>
                                <select aria-label="入金締日" class="cust-detail-closing-day" data-day-input="custOrdergdt"
                                    th:field="*{custGetcdt}">
                                    <option value="">選択</option>
                                    <option value="01">10日</option>
                                    <option value="02">15日</option>
                                    <option value="03">末日</option>
                                    <option value="05">指定</option>
                                </select>
                                <span id="custOrdergdtGroup" class="cust-detail-specified-day">
                                    <input id="custOrdergdt" aria-label="入金指定日" type="number" min="1" max="31"
                                        th:field="*{custOrdergdt}">
                                    <span>日</span>
                                </span>
                            </dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt>支払日</dt>
                            <dd class="cust-detail-date-rule">
                                <select aria-label="支払月" th:field="*{custPaydt}">
                                    <option value="">選択</option>
                                    <option value="01">当月</option>
                                    <option value="02">翌月</option>
                                    <option value="03">翌々月</option>
                                </select>
                                <select aria-label="支払締日" class="cust-detail-closing-day" data-day-input="custOrderdt"
                                    th:field="*{custClosedt}">
                                    <option value="">選択</option>
                                    <option value="01">10日</option>
                                    <option value="02">15日</option>
                                    <option value="03">末日</option>
                                    <option value="05">指定</option>
                                </select>
                                <span id="custOrderdtGroup" class="cust-detail-specified-day">
                                    <input id="custOrderdt" aria-label="支払指定日" type="number" min="1" max="31"
                                        th:field="*{custOrderdt}">
                                    <span>日</span>
                                </span>
                            </dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt>
                                <label for="custBankNm">銀行名<span class="cust-detail-required">*</span></label>
                            </dt>
                            <dd>
                                <input id="bankCd" type="hidden" th:field="*{bankCd}">
                                <input id="bankChrcd" type="hidden" th:field="*{bankChrcd}">
                                <input id="custBankNm" type="text" th:field="*{custBankNm}" required>
                                <button id="openBankSearch" class="button button--spec cust-detail-bank-search"
                                    type="button">検索</button>
                                <span class="field-error" th:if="${#fields.hasErrors('bankCd')}"
                                    th:errors="*{bankCd}"></span>
                            </dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custBranchNm">支店名</label></dt>
                            <dd><input id="custBranchNm" type="text" th:field="*{custBranchNm}"></dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custDeposittype">預金種別</label></dt>
                            <dd>
                                <select id="custDeposittype" th:field="*{custDeposittype}">
                                    <option value="">選択してください</option>
                                    <option value="01">普通預金</option>
                                    <option value="02">当座預金</option>
                                </select>
                                <input id="custDeposittypeMaster" type="hidden" disabled>
                            </dd>
                        </div>
                        <div class="cust-detail-item cust-detail-item--remarks">
                            <dt><label for="custRmk2">備考</label></dt>
                            <dd><textarea id="custRmk2" rows="2" th:field="*{custRmk2}"></textarea></dd>
                        </div>
                    </dl>

                    <dl class="cust-detail-list">
                        <div class="cust-detail-payment-spacer" aria-hidden="true"></div>
                        <div class="cust-detail-item">
                            <dt>
                                <label for="custBranchcd">支店番号<span class="cust-detail-required">*</span></label>
                            </dt>
                            <dd><input id="custBranchcd" type="text" th:field="*{custBranchcd}" required></dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custAccountno">口座番号</label></dt>
                            <dd><input id="custAccountno" type="text" th:field="*{custAccountno}"></dd>
                        </div>
                        <div class="cust-detail-item">
                            <dt><label for="custNominee">名義人</label></dt>
                            <dd><input id="custNominee" type="text" th:field="*{custNominee}"></dd>
                        </div>
                    </dl>
                </div>
            </section>

            <dialog id="bankSearchDialog" class="cust-detail-bank-dialog">
                <div class="cust-detail-bank-dialog__header">
                    <h2>銀行検索</h2>
                    <button id="closeBankSearch" type="button" aria-label="銀行検索を閉じる">×</button>
                </div>
                <div class="cust-detail-bank-dialog__filter">
                    <label for="bankSearchKeyword">銀行名・支店名</label>
                    <input id="bankSearchKeyword" type="search" placeholder="検索文字を入力">
                </div>
                <div class="cust-detail-bank-dialog__body">
                    <table class="cust-detail-bank-table">
                        <thead>
                            <tr>
                                <th>選択</th>
                                <th>銀行名</th>
                                <th>支店番号</th>
                                <th>支店名</th>
                                <th>口座番号</th>
                                <th>名義人</th>
                            </tr>
                        </thead>
                        <tbody id="bankSearchRows">
                            <tr th:each="bank : ${bankMasters}"
                                th:attr="data-search-text=${bank.bankNm + ' ' + bank.bankBranchnm + ' ' + bank.bankBranchcd}">
                                <td>
                                    <button class="button cust-detail-bank-select" type="button"
                                        th:attr="data-bank-cd=${bank.bankCd},
                                            data-bank-chrcd=${bank.bankChrcd},
                                            data-bank-nm=${bank.bankNm},
                                            data-branch-nm=${bank.bankBranchnm},
                                            data-branch-cd=${bank.bankBranchcd},
                                            data-account-no=${bank.bankAccountno},
                                            data-nominee=${bank.bankNominee},
                                            data-deposit-type=${bank.bankDeposittype}">
                                        選択
                                    </button>
                                </td>
                                <td th:text="${bank.bankNm}"></td>
                                <td th:text="${bank.bankBranchcd}"></td>
                                <td th:text="${bank.bankBranchnm}"></td>
                                <td th:text="${bank.bankAccountno}"></td>
                                <td th:text="${bank.bankNominee}"></td>
                            </tr>
                        </tbody>
                    </table>
                    <p id="bankSearchEmpty" class="cust-detail-empty" hidden>該当する銀行情報がありません。</p>
                </div>
            </dialog>

            <footer class="cust-detail-audit">
                <p><span>作成者：</span><strong th:text="${cust.custCrdUsr ?: '-'}"></strong></p>
                <p><span>作成日：</span><strong
                        th:text="${cust.custCrdDt == null ? '-' : #temporals.format(cust.custCrdDt, 'yyyy/MM/dd')}"></strong>
                </p>
                <p><span>更新者：</span><strong th:text="${cust.custUpdUsr ?: '-'}"></strong></p>
                <p><span>更新日：</span><strong
                        th:text="${cust.custUpdDt == null ? '-' : #temporals.format(cust.custUpdDt, 'yyyy/MM/dd')}"></strong>
                </p>
            </footer>
        </form>
    </main>
    <script th:src="@{/js/cust-detail.js}"></script>
    <script>
        document.querySelectorAll(".cust-detail-closing-day").forEach((select) => {
            const dayInput = document.getElementById(select.dataset.dayInput);
            const dayGroup = document.getElementById(`${select.dataset.dayInput}Group`);

            const updateDayInput = () => {
                const isSpecified = select.value === "05";
                dayInput.disabled = !isSpecified;
                dayInput.required = isSpecified;
                dayGroup.hidden = !isSpecified;
                if (!isSpecified) {
                    dayInput.value = "";
                }
            };

            select.addEventListener("change", updateDayInput);
            updateDayInput();
        });

        async function searchPostalAddress() {
            const postalCode = document.getElementById("custPostno");
            const address = document.getElementById("custAddress");
            const normalized = postalCode?.value.replace(/\D/g, "");
            if (!normalized || normalized.length !== 7) {
                window.alert("郵便番号は7桁で入力してください。");
                return;
            }
            const response = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${normalized}`);
            const data = await response.json();
            if (!data.results?.length) {
                window.alert("住所が見つかりませんでした。");
                return;
            }
            const result = data.results[0];
            address.value = `${result.address1}${result.address2}${result.address3}`;
        }
    </script>
</body>

</html>
